<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axxanoid Marketplace Documentation</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; line-height: 1.6; margin: 20px; background-color: #f8fafc; color: #334155; }
        .container { max-width: 900px; margin: 0 auto; background: #fff; padding: 40px; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); }
        h1, h2, h3 { color: #0f172a; margin-top: 1.5em; }
        h1 { border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        h2 { border-bottom: 1px solid #e2e8f0; padding-bottom: 8px; }
        code { background-color: #f1f5f9; color: #db2777; padding: 2px 6px; border-radius: 4px; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 0.9em; }
        pre { background-color: #1e293b; color: #f8fafc; padding: 15px; border-radius: 6px; overflow-x: auto; font-size: 0.9em; }
        pre code { background-color: transparent; color: inherit; padding: 0; }
        ul, ol { margin-left: 20px; }
        li { margin-bottom: 8px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; margin-top: 10px; }
        table, th, td { border: 1px solid #cbd5e1; }
        th, td { padding: 12px; text-align: left; }
        th { background-color: #f1f5f9; color: #0f172a; font-weight: 600; }
        .callout { background-color: #eff6ff; border-left: 4px solid #3b82f6; padding: 15px; margin: 20px 0; border-radius: 0 4px 4px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Axxanoid Marketplace: Developer Documentation</h1>
    </div>
</body>
</html>
